<!DOCTYPE html>
<html>
<head>
    <title>View Buses</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>All Buses</h1>

<table border="1" align="center" cellpadding="10">
    <thead>
    <tr>
        <th>ID</th>
        <th>Bus Name</th>
        <th>Source</th>
        <th>Destination</th>
        <th>Seats</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody id="busTable">
    </tbody>

</table>

<script>

    fetch("http://localhost:8080/bus")
        .then(response => response.json())
        .then(data => {

            let table = document.getElementById("busTable");

            data.forEach(bus => {

                table.innerHTML += `
        <tr>
            <td>${bus.id}</td>
            <td>${bus.busName}</td>
            <td>${bus.source}</td>
            <td>${bus.destination}</td>
            <td>${bus.seats}</td>
            <td>
                <button onclick="editBus(${bus.id})">
                    Edit
                </button>

                <button onclick="deleteBus(${bus.id})">
                    Delete
                </button>
            </td>
        </tr>
        `;
            });

        });

    function deleteBus(id)
    {
        fetch(`http://localhost:8080/bus/${id}`,{
            method:"DELETE"
        })
            .then(response => response.text())
            .then(data => {
                alert(data);
                location.reload();
            });
    }

    function editBus(id)
    {
        window.location.href =
            `edit-bus.html?id=${id}`;
    }

</script>

</body>
</html>
