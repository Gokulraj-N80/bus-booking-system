<!DOCTYPE html>
<html>
<head>
    <title>Search Bus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Search Bus</h1>

<input type="text" id="source" placeholder="Source">
<br><br>

<input type="text" id="destination" placeholder="Destination">
<br><br>

<button onclick="searchBus()">Search</button>

<br><br>

<table border="1" align="center" cellpadding="10">
    <thead>
    <tr>
        <th>ID</th>
        <th>Bus Name</th>
        <th>Source</th>
        <th>Destination</th>
        <th>Seats</th>
    </tr>
    </thead>

    <tbody id="resultTable">
    </tbody>
</table>

<script>

    function searchBus()
    {
        let source =
            document.getElementById("source").value;

        let destination =
            document.getElementById("destination").value;

        fetch(`http://localhost:8080/bus/search?source=${source}&destination=${destination}`)
            .then(response => response.json())
            .then(data => {

                let table =
                    document.getElementById("resultTable");

                table.innerHTML = "";

                data.forEach(bus => {

                    table.innerHTML += `
            <tr>
                <td>${bus.id}</td>
                <td>${bus.busName}</td>
                <td>${bus.source}</td>
                <td>${bus.destination}</td>
                <td>${bus.seats}</td>
            </tr>
            `;
                });

            });
    }

</script>

</body>
</html>
