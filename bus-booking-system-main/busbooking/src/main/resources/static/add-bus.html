<!DOCTYPE html>
<html>
<head>
  <title>Add Bus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Add New Bus</h2>

<input type="text" id="busName" placeholder="Bus Name">
<br><br>

<input type="text" id="source" placeholder="Source">
<br><br>

<input type="text" id="destination" placeholder="Destination">
<br><br>

<input type="number" id="seats" placeholder="Seats">
<br><br>

<button onclick="addBus()">Add Bus</button>

<script>

  function addBus()
  {
    const bus = {
      busName: document.getElementById("busName").value,
      source: document.getElementById("source").value,
      destination: document.getElementById("destination").value,
      seats: document.getElementById("seats").value
    };

    fetch("http://localhost:8080/bus", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(bus)
    })
            .then(response => response.json())
            .then(data => {
              alert("Bus Added Successfully");
              console.log(data);
            })
            .catch(error => {
              console.error(error);
              alert("Error Adding Bus");
            });
  }

</script>

</body>
</html>
