<!DOCTYPE html>
<html>
<head>
    <title>Book Ticket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Book Your Ticket</h1>

<input type="text" id="passengerName" placeholder="Passenger Name">
<br><br>

<input type="text" id="mobileNumber" placeholder="Mobile Number">
<br><br>

<input type="number" id="busId" placeholder="Bus ID">
<br><br>

<input type="number" id="seatsBooked" placeholder="Seats Booked">
<br><br>

<button onclick="bookTicket()">Book Ticket</button>
<a href="view-buses.html">
    <button class="btn">View Buses</button>
</a>

<script>

    function bookTicket()
    {
        const booking = {
            passengerName: document.getElementById("passengerName").value,
            mobileNumber: document.getElementById("mobileNumber").value,
            busId: document.getElementById("busId").value,
            seatsBooked: document.getElementById("seatsBooked").value
        };

        fetch("http://localhost:8080/booking", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(booking)
        })
            .then(response => response.json())
            .then(data => {
                alert("Ticket Booked Successfully 🎉");
                console.log(data);
            })
            .catch(error => {
                console.log(error);
                alert("Booking Failed");
            });
    }

</script>

</body>
</html>
